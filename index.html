<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kereta Alert Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-container">
        <h2>Train Arrival Alert</h2>

        <div class="track-container">
            <span class="station-icon start-st">🏠</span>
            <div class="rail"></div>
            <div id="train-sprite" class="train">🚂</div>
            <span class="station-icon end-st">📍</span>
        </div>

        <div class="search-section">
            <input id="station-search" type="text" placeholder="Cari stasiun tujuan..." oninput="searchStation(this.value)">
            <div id="search-results" class="results-dropdown"></div>
        </div>
        
        <div class="info-grid">
            <div class="card"><span>Jarak Sisa</span><b id="distance-info">- km</b></div>
            <div class="card"><span>Estimasi</span><b id="eta">- min</b></div>
        </div>

        <button id="btn-start" onclick="startTracking()" disabled>AKTIFKAN PENGINGAT</button>

        <div class="history-section">
            <h4>Log Perjalanan</h4>
            <ul id="travel-log">
                <li style="color:#999">Belum ada aktivitas...</li>
            </ul>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
